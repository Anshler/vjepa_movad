# --------------------------------------------------------------------
# V-JEPA 2.1 + MOVAD — SlotSSM + inverted attention  (~19M trainable)
#
# Same as vjepa_slotssm.yaml but with inverted cross-attention
# (SlotSSM reference repo default).  Softmax runs over slots instead
# of features, forcing input patches to compete for slot assignment.
# Uses eager MultiHeadAttention — FlashMHA incompatible with inverted.
# --------------------------------------------------------------------

# --- V-JEPA 2.1 encoder ---------------------------------------------------
model_name: vit_large
img_size: 256
num_frames: 4
tubelet_size: 2
patch_size: 16
checkpoint_path: null
checkpoint_key: ema_encoder
pool: mean                          # ignored — SlotSSM uses full patch tokens

# --- Temporal model -------------------------------------------------------
temporal_model: slotssm
dim_latent: 1024
dropout: 0.3
num_slots: 32
slot_dim: 512
num_ssm_blocks: 4
mamba_d_state: 128
mamba_d_conv: 4
mamba_expand: 2
mamba_version: mamba2
use_inverted_attention: true        # inverted cross-attn (reference repo default)

# --- Data -----------------------------------------------------------------
NF: 4
VCL: null
apply_softmax: true
data_mean: [0.5, 0.5, 0.5]
data_path: ./data/dota
data_std: [0.5, 0.5, 0.5]
dataset: Dota
image_shape: [720, 1280]
input_shape: [256, 256]
FPS: 10

# --- Training -------------------------------------------------------------
batch_size: 8
class_weights: [0.3, 0.7]
epochs: 200
lr: 0.001
snapshot_interval: 10
num_workers: 0
amp_dtype: bf16                      # bf16 (AMP mixed-precision), fp16, or fp32 (no AMP)

# --- Augmentation ---------------------------------------------------------
horizontal_flip_prob: 0.5
vertical_flip_prob: 0.0

# --- Output ---------------------------------------------------------------
output: ./output/vjepa_slotssm_inv
