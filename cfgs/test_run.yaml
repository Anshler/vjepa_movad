# --------------------------------------------------------------------
# Minimal smoke-test config — ViT-B/256 encoder + Mamba
# Matches vjepa2_1_vitb_dist_vitG_384.pt checkpoint
# --------------------------------------------------------------------

# --- V-JEPA 2.1 encoder ---------------------------------------------------
model_name: vit_base
img_size: 384
num_frames: 4
tubelet_size: 2
patch_size: 16
checkpoint_path: null
checkpoint_key: ema_encoder
pool: mean

# --- Temporal model -------------------------------------------------------
temporal_model: mamba
dim_latent: 768
dropout: 0.3
rnn_cell_num: 3                     # number of Mamba blocks
mamba_d_state: 128
mamba_d_conv: 4
mamba_expand: 2
mamba_version: mamba2

# --- Data -----------------------------------------------------------------
NF: 4
VCL: 16

data_mean: [0.5, 0.5, 0.5]
data_path: ./data/dota
data_std: [0.5, 0.5, 0.5]
dataset: Dota
image_shape: [720, 1280]
input_shape: [384, 384]
FPS: 10

# --- Training -------------------------------------------------------------
batch_size: 8
class_weights: [0.3, 0.7]
epochs: 2
lr: 0.001
snapshot_interval: 1
enable_validation: true
validation_epoch_step: 10
num_workers: 4

amp_dtype: fp16

# --- Augmentation ---------------------------------------------------------
horizontal_flip_prob: 0.0
vertical_flip_prob: 0.0

# --- Output ---------------------------------------------------------------
output: ./output
