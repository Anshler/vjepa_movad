# --------------------------------------------------------------------
# V-JEPA 2.1 + MOVAD — SlotSSM temporal model  (~21M trainable)
#
# K=32 slots × D=512, 4 blocks, Mamba2.  Matches original SlotSSM
# paper (NeurIPS 2024): same slot count, block count, and Mamba
# version.  Standard multi-head cross-attn + per-slot Mamba +
# slot self-attention.  Classifier uses learned attention-pooling.
# --------------------------------------------------------------------

# --- V-JEPA 2.1 encoder ---------------------------------------------------
model_name: vit_large
img_size: 256
num_frames: 4
tubelet_size: 2
patch_size: 16
checkpoint_path: null
checkpoint_key: ema_encoder
pool: mean                          # ignored — SlotSSM uses full patch tokens

# --- Temporal model -------------------------------------------------------
temporal_model: slotssm
dim_latent: 1024
dropout: 0.3
num_slots: 32                       # K — matches original SlotSSM paper
slot_dim: 512                       # D — (d_model*expand/headdim)=1024/64=16, 16%8=0 ✓
num_ssm_blocks: 4                   # matches original SlotSSM paper
mamba_d_state: 128
mamba_d_conv: 4
mamba_expand: 2
mamba_version: mamba2               # matches original SlotSSM paper default
use_inverted_attention: false        # standard cross-attn (FlashMHA-compatible)

# --- Data -----------------------------------------------------------------
NF: 4
VCL: 32
apply_softmax: true
data_mean: [0.5, 0.5, 0.5]
data_path: ./data/dota
data_std: [0.5, 0.5, 0.5]
dataset: Dota
image_shape: [720, 1280]
input_shape: [256, 256]
FPS: 10

# --- Training -------------------------------------------------------------
batch_size: 8
class_weights: [0.3, 0.7]
epochs: 200
lr: 0.001
snapshot_interval: 10
num_workers: 4
amp_dtype: bf16                      # bf16 (AMP mixed-precision), fp16, or fp32 (no AMP)

# --- Augmentation ---------------------------------------------------------
horizontal_flip_prob: 0.5
vertical_flip_prob: 0.0

# --- Output ---------------------------------------------------------------
output: ./output/vjepa_slotssm
