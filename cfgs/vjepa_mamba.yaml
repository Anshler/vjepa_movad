# --------------------------------------------------------------------
# V-JEPA 2.1 + MOVAD — Mamba temporal model  (~22M trainable)
#
# Replaces the 3-layer LSTM with 3 Mamba2 SSM blocks (mamba_ssm pkg).
# Same frozen V-JEPA encoder, same classifier head.
# --------------------------------------------------------------------

# --- V-JEPA 2.1 encoder ---------------------------------------------------
model_name: vit_large
img_size: 256
num_frames: 4
tubelet_size: 2
patch_size: 16
checkpoint_path: null
checkpoint_key: ema_encoder
pool: mean

# --- Temporal model -------------------------------------------------------
temporal_model: mamba
dim_latent: 1024
dropout: 0.3
rnn_cell_num: 3                     # number of Mamba blocks (= num layers)
mamba_d_state: 128
mamba_d_conv: 4
mamba_expand: 2
mamba_version: mamba2               # Mamba2 (default in SlotSSM repo)

# --- Data -----------------------------------------------------------------
NF: 4
VCL: 32
apply_softmax: true
data_mean: [0.5, 0.5, 0.5]
data_path: ./data/dota
data_std: [0.5, 0.5, 0.5]
dataset: Dota
image_shape: [720, 1280]
input_shape: [256, 256]
FPS: 10

# --- Training -------------------------------------------------------------
batch_size: 8
class_weights: [0.3, 0.7]
epochs: 200
lr: 0.001
snapshot_interval: 10
num_workers: 4
amp_dtype: bf16                      # bf16 (AMP mixed-precision), fp16, or fp32 (no AMP)

# --- Augmentation ---------------------------------------------------------
horizontal_flip_prob: 0.5
vertical_flip_prob: 0.0

# --- Output ---------------------------------------------------------------
output: ./output/vjepa_mamba
