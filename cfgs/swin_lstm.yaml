# --------------------------------------------------------------------
# Swin Transformer 3D + LSTM â€” matching MOVAD paper (v4_2)
#
# Backbone: Video Swin-B pretrained on Something-Something V2
# Temporal: 3-layer LSTM (1024 hidden)
#
# Architecture match with MOVAD:
#   MOVAD:  Swinâ†’AdaptiveAvgPool3d((1,6,6))â†’flatten(36864)â†’LNâ†’Linear(36864â†’1024)â†’ReLUâ†’Dropâ†’LSTM
#   Here:   Swinâ†’AdaptiveAvgPool3d((1,6,6))â†’flatten(36864)â†’LNâ†’Linear(36864â†’1024)â†’ReLUâ†’Dropâ†’LSTM  âœ“
#
# Remaining differences from MOVAD (not yet addressed):
#   - AMP autocast fp16 (MOVAD uses no mixed precision â€” set amp_dtype: fp32 to match)
# --------------------------------------------------------------------

# --- Encoder ----------------------------------------------------------------
model_name: swin_base_ssv2           # â†’ swin_base_patch244_window1677_sthv2
img_size: 256
num_frames: 4
checkpoint_path: pretrained/swin_base_patch244_window1677_sthv2.pth

# --- Temporal model ---------------------------------------------------------
temporal_model: lstm
dim_latent: 1024                     # Swin-B output (matches embed_dim)
dropout: 0.3
rnn_cell_num: 3                      # 3-layer LSTM (MOVAD v4_2)
rnn_state_size: 1024

# --- Data -------------------------------------------------------------------
NF: 4
VCL: 8                               # matches MOVAD v4_2
apply_softmax: true
data_mean: [0.5, 0.5, 0.5]
data_path: ./data/dota
data_std: [0.5, 0.5, 0.5]
dataset: Dota
image_shape: [720, 1280]
input_shape: [240, 320]              # MOVAD (320 Ã— 240), smaller resolution
FPS: 10

# --- Training ---------------------------------------------------------------
batch_size: 4                        # smaller than V-JEPA â€” Swin-B has ~88M params
class_weights: [0.3, 0.7]
epochs: 200
lr: 0.00005                          # MOVAD v4_2 LR
snapshot_interval: 10
enable_validation: true
validation_epoch_step: 10
num_workers: 4
grad_accum: 2                        # effective batch â‰ˆ 2Ã—4 = 8 (matches MOVAD)
amp_dtype: fp16                      # Swin supports fp16 (set to fp32 to match MOVAD)

# --- Augmentation -----------------------------------------------------------
horizontal_flip_prob: 0.5
vertical_flip_prob: 0.0

# --- Logging ----------------------------------------------------------------
wandb_mode: disabled

# --- Output -----------------------------------------------------------------
output: ./output
