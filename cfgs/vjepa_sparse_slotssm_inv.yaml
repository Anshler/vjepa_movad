# --------------------------------------------------------------------
# V-JEPA 2.1 + MOVAD — Sparse SlotSSM + inverted attention  (~19M trainable)
#
# Same as vjepa_sparse_slotssm.yaml but with inverted cross-attention.
# Combines two complementary specialization mechanisms:
#   1. Inverted attention — features compete for slots (spatial binding)
#   2. Sparse top-k gating — inactive slots freeze (temporal persistence)
# --------------------------------------------------------------------

# --- V-JEPA 2.1 encoder ---------------------------------------------------
model_name: vit_large
img_size: 256
num_frames: 4
tubelet_size: 2
patch_size: 16
checkpoint_path: null
checkpoint_key: ema_encoder
pool: mean                          # ignored — Sparse SlotSSM uses full patches

# --- Temporal model -------------------------------------------------------
temporal_model: sparse_slotssm
dim_latent: 1024
dropout: 0.3
num_slots: 32
slot_dim: 512
num_ssm_blocks: 4
top_k: 16
eps_random: 0.05
entropy_weight: 0.01
mamba_d_state: 128
mamba_d_conv: 4
mamba_expand: 2
mamba_version: mamba2
use_inverted_attention: true        # inverted cross-attn + sparse gate

# --- Data -----------------------------------------------------------------
NF: 4
VCL: 128
apply_softmax: true
data_mean: [0.5, 0.5, 0.5]
data_path: ./data/dota
data_std: [0.5, 0.5, 0.5]
dataset: Dota
image_shape: [720, 1280]
input_shape: [256, 256]
FPS: 10

# --- Training -------------------------------------------------------------
batch_size: 8
class_weights: [0.3, 0.7]
epochs: 200
lr: 0.001
snapshot_interval: 10
num_workers: 4
amp_dtype: bf16                      # bf16 (AMP mixed-precision), fp16, or fp32 (no AMP)

# --- Augmentation ---------------------------------------------------------
horizontal_flip_prob: 0.5
vertical_flip_prob: 0.0

# --- Output ---------------------------------------------------------------
output: ./output/vjepa_sparse_slotssm_inv
