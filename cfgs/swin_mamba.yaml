# --------------------------------------------------------------------
# Swin Transformer 3D + Mamba2 temporal model
#
# Backbone: Video Swin-B pretrained on Something-Something V2
# Temporal: 3 Mamba2 SSM blocks (replaces LSTM)
#
# Architecture:
#   Swin → AdaptiveAvgPool3d((1,6,6)) → flatten(36864) → LN → Linear(36864→1024) → ReLU → Drop → Mamba2×3 → Linear(1024→1024) → ReLU → Drop → Linear(1024→2)
# --------------------------------------------------------------------

# --- Encoder ----------------------------------------------------------------
model_name: swin_base_ssv2           # → swin_base_patch244_window1677_sthv2
img_size: 256
num_frames: 4
checkpoint_path: pretrained/swin_base_patch244_window1677_sthv2.pth

# --- Temporal model ---------------------------------------------------------
temporal_model: mamba
dim_latent: 1024                     # Swin-B output (matches embed_dim)
dropout: 0.3
rnn_cell_num: 3                      # number of Mamba blocks
mamba_d_state: 128
mamba_d_conv: 4
mamba_expand: 2
mamba_version: mamba2

# --- Data -------------------------------------------------------------------
NF: 4
VCL: 8                               # matches MOVAD v4_2

data_mean: [0.5, 0.5, 0.5]
data_path: ./data/dota
data_std: [0.5, 0.5, 0.5]
dataset: Dota
image_shape: [720, 1280]
input_shape: [240, 320]              # MOVAD (320 × 240), smaller resolution
FPS: 10

# --- Training ---------------------------------------------------------------
batch_size: 4                        # smaller than V-JEPA — Swin-B has ~88M params
class_weights: [0.3, 0.7]
epochs: 200
lr: 0.0001                           # Mamba default (higher than LSTM's 5e-5)
snapshot_interval: 10
enable_validation: true
validation_epoch_step: 10
num_workers: 4

amp_dtype: fp16                      # Swin + Mamba both support fp16

# --- Augmentation -----------------------------------------------------------
horizontal_flip_prob: 0.5
vertical_flip_prob: 0.0

# --- Logging ----------------------------------------------------------------
wandb_mode: disabled

# --- Output -----------------------------------------------------------------
output: ./output
