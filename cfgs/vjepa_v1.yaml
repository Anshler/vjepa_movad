# --------------------------------------------------------------------
# V-JEPA 2.1 + MOVAD — supervised anomaly detection (LSTM baseline)
#
# Frozen V-JEPA 2.1 ViT-L encoder + 3-layer LSTM + binary classifier.
# Identical to original MOVAD's temporal architecture; only the
# backbone changes (V-JEPA ViT replaces Video Swin Transformer).
# --------------------------------------------------------------------

# --- V-JEPA 2.1 encoder ---------------------------------------------------
model_name: vit_base
img_size: 384
num_frames: 4
tubelet_size: 2
patch_size: 16
checkpoint_path: null
checkpoint_key: ema_encoder
vjepa_spatial_grid: [6, 6]
pool: mean

# --- Temporal model -------------------------------------------------------
temporal_model: lstm                 # "lstm" | "mamba" | "slotssm" | "sparse_slotssm"
dim_latent: 1024
dropout: 0.3
rnn_state_size: 1024
rnn_cell_num: 3

# --- Data -----------------------------------------------------------------
NF: 4
VCL: 16

data_mean: [0.5, 0.5, 0.5]
data_path: ./data/dota
data_std: [0.5, 0.5, 0.5]
dataset: Dota
image_shape: [720, 1280]
input_shape: [384, 384]
FPS: 10

# --- Training -------------------------------------------------------------
batch_size: 8
class_weights: [0.3, 0.7]
epochs: 200
lr: 0.0001
snapshot_interval: 10
enable_validation: true
validation_epoch_step: 10
num_workers: 4

amp_dtype: fp16                      # bf16 (AMP mixed-precision), fp16, or fp32 (no AMP)

# --- Augmentation ---------------------------------------------------------
horizontal_flip_prob: 0.5
vertical_flip_prob: 0.0

# --- Output ---------------------------------------------------------------
output: ./output
